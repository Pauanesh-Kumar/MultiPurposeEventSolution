name: CI - build, test and push image to ACR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_LOGIN_SERVER: multipurposeacr.azurecr.io
  IMAGE_NAME: multipurposeapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore, build and test
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet test --no-build -c Release || true

      - name: Login to ACR (docker username/password)
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image (immutable tag = commit SHA)
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -f Dockerfile -t $IMAGE .
          docker push $IMAGE
          # optional latest tag for convenience (not used for production deploys)
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest