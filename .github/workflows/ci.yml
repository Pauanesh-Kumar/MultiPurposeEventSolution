
name: CI - Build, Test, and SonarQube Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted, Windows, X64, sonarqube]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Skip setup-dotnet if already installed locally
      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests with Coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarQube Begin Analysis
        run: >
          dotnet sonarscanner begin
          /k:"my-dotnet-multi-purpose-webapp"
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/*/coverage.cobertura.xml"

      - name: Build for SonarQube
        run: dotnet build --no-restore --configuration Release

      - name: SonarQube End Analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

